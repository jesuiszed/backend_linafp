openapi: 3.0.3
info:
  title: LINAFP API
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /health:
    get:
      tags: [health]
      summary: Healthcheck API
      responses:
        '200':
          description: OK
  /clubs:
    get:
      tags: [clubs]
      summary: Lister les clubs
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: q
          schema: { type: string }
      responses:
        '200':
          description: Liste paginée
  /standings:
    get:
      tags: [standings]
      summary: Classement d'une saison
      parameters:
        - in: query
          name: season_id
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Classement calculé
